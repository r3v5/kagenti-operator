---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-workloads-authbridge
  failurePolicy: Fail
  name: inject.kagenti.io
  namespaceSelector:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
      - kube-system
      - kube-public
      - kube-node-lease
      - kagenti-operator-system
    matchLabels:
      kagenti-enabled: "true"
  objectSelector:
    matchExpressions:
    - key: kagenti.io/type
      operator: In
      values:
      - agent
      - tool
    - key: kagenti.io/inject
      operator: NotIn
      values:
      - disabled
  reinvocationPolicy: IfNeeded
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
  sideEffects: None
  timeoutSeconds: 10
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-agent-kagenti-dev-v1alpha1-agentcard
  failurePolicy: Fail
  name: vagentcard.kb.io
  rules:
  - apiGroups:
    - agent.kagenti.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - agentcards
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-agent-kagenti-dev-v1alpha1-agentruntime
  failurePolicy: Fail
  name: vagentruntime.kb.io
  rules:
  - apiGroups:
    - agent.kagenti.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - agentruntimes
  sideEffects: None
